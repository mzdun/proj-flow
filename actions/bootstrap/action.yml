name: Python + Project Flow bootstrap
description: Sets up Flow for current checkout.
author: Marcin Zdun

inputs:
  python-version:
    description: "Version range or exact version of Python or PyPy to use, using SemVer's version range syntax. Reads from .python-version if unset."

  cache-prefix:
    description: How to prefix the virtual environment cache
    required: true

  checkout:
    description: >
      Whether to checkout the code
    default: false

  submodules:
    description: >
      Whether to checkout submodules: `true` to checkout submodules or `recursive` to
      recursively checkout submodules.


      When the `ssh-key` input is not provided, SSH URLs beginning with `git@github.com:` are
      converted to HTTPS.
    default: false

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      if: ${{ inputs.checkout }}
      with:
        submodules: ${{ inputs.submodules }}

    - name: Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Virtual env cache
      uses: actions/cache@v5
      id: cache
      with:
        path: .venv
        key: ${{ inputs.cache-prefix }}-${{ hashFiles('.flow/flow.py') }}
        restore-keys: |
          ${{ inputs.cache-prefix }}-

    - name: Install dependencies
      shell: bash
      run: |
        python ./.flow/flow.py bootstrap
